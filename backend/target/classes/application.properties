spring.application.name=jw-registry
server.port=${SERVER_PORT:8080}
server.shutdown=graceful
server.forward-headers-strategy=framework

# Provide these values through environment variables or a systemd EnvironmentFile.
# Example:
# SPRING_DATASOURCE_URL=jdbc:mysql://db-host:3306/jw_registry?useSSL=true&serverTimezone=UTC
# SPRING_DATASOURCE_USERNAME=jw_registry_user
# SPRING_DATASOURCE_PASSWORD=strong-password
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.pool-name=JwRegistryHikariPool
spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT_MS:30000}
spring.datasource.hikari.idle-timeout=${DB_IDLE_TIMEOUT_MS:600000}
spring.datasource.hikari.max-lifetime=${DB_MAX_LIFETIME_MS:1800000}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=false

spring.jackson.time-zone=UTC
spring.jackson.serialization.write-dates-as-timestamps=false

logging.level.root=INFO
logging.level.com.jwplatform.registry=INFO

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:}
