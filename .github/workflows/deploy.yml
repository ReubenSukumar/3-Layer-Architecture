name: Deploy 3-Tier App (Bastion Multi-Instance)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to deploy
        required: true
        default: main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build JAR
        run: |
          cd backend
          mvn clean package -DskipTests

      - name: Archive frontend
        run: |
          tar -czf frontend.tar.gz \
            index.html add-user.html excommunicado.html location.html \
            *.css *.js assets

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          cat > ~/.ssh/config <<EOF
          Host bastion
            HostName ${{ secrets.BASTION_HOST }}
            User ${{ secrets.EC2_USER }}
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no
            UserKnownHostsFile=/dev/null

          Host *
            User ${{ secrets.EC2_USER }}
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no
            UserKnownHostsFile=/dev/null
          EOF
          chmod 600 ~/.ssh/config

      - name: Verify JAR exists
        run: |
          ls -lh backend/target/
          test -f backend/target/app.jar

      - name: Deploy frontend to all instances
        run: |
          set -euo pipefail

          IFS=',' read -r -a FRONTEND_HOSTS <<< "${{ secrets.FRONTEND_HOSTS }}"

          for HOST in "${FRONTEND_HOSTS[@]}"; do
            HOST="$(echo "$HOST" | xargs)"
            echo "Deploying frontend to $HOST"

            scp -o ProxyJump=${{ secrets.EC2_USER }}@${{ secrets.BASTION_HOST }} \
              frontend.tar.gz \
              ${{ secrets.EC2_USER }}@"$HOST":/tmp/frontend.tar.gz

            ssh -o ProxyJump=${{ secrets.EC2_USER }}@${{ secrets.BASTION_HOST }} \
              ${{ secrets.EC2_USER }}@"$HOST" \
              "sudo mkdir -p /var/www/html && \
               sudo find /var/www/html -mindepth 1 -maxdepth 1 -exec rm -rf {} + && \
               sudo tar -xzf /tmp/frontend.tar.gz -C /var/www/html && \
               sudo systemctl restart nginx"
          done

      - name: Deploy backend to all instances
        run: |
          set -euo pipefail

          IFS=',' read -r -a BACKEND_HOSTS <<< "${{ secrets.BACKEND_HOSTS }}"

          for HOST in "${BACKEND_HOSTS[@]}"; do
            HOST="$(echo "$HOST" | xargs)"
            echo "Deploying backend to $HOST"

            scp -o ProxyJump=${{ secrets.EC2_USER }}@${{ secrets.BASTION_HOST }} \
              backend/target/app.jar \
              ${{ secrets.EC2_USER }}@"$HOST":/tmp/app.jar

            ssh -o ProxyJump=${{ secrets.EC2_USER }}@${{ secrets.BASTION_HOST }} \
              ${{ secrets.EC2_USER }}@"$HOST" \
              "sudo mkdir -p /opt/jw-registry && \
               sudo mv /tmp/app.jar /opt/jw-registry/app.jar && \
               sudo chown -R ${{ secrets.EC2_USER }}:${{ secrets.EC2_USER }} /opt/jw-registry && \
               sudo systemctl daemon-reload && \
               sudo systemctl restart jw-registry && \
               sudo systemctl is-active --quiet jw-registry"

            ssh -o ProxyJump=${{ secrets.EC2_USER }}@${{ secrets.BASTION_HOST }} \
              ${{ secrets.EC2_USER }}@"$HOST" \
              "for i in \$(seq 1 15); do \
                 curl -fsS http://localhost:8080/health && exit 0; \
                 sleep 3; \
               done; \
               exit 1"
          done
