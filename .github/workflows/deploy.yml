name: Deploy 3-Tier App (Optimized)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to deploy
        required: true
        default: main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SERVER_PORT: "8080"
      JPA_DDL_AUTO: "update"
      DB_MAX_POOL_SIZE: "10"
      DB_MIN_IDLE: "2"

      APP_CORS_ALLOWED_ORIGINS: ${{ secrets.APP_CORS_ALLOWED_ORIGINS }}
      PRIVATE_ALB_DNS: ${{ secrets.PRIVATE_ALB_DNS }}

      SPRING_DATASOURCE_URL: ${{ secrets.SPRING_DATASOURCE_URL }}
      SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
      SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}

      BASTION_HOST: ${{ secrets.BASTION_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      FRONTEND_HOSTS: ${{ secrets.FRONTEND_HOSTS }}
      BACKEND_HOSTS: ${{ secrets.BACKEND_HOSTS }}

    steps:
      # ------------------------
      # Checkout
      # ------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      # ------------------------
      # Build Backend
      # ------------------------
      - name: Build backend
        run: |
          cd backend
          mvn clean package -DskipTests

      # ------------------------
      # Package Frontend
      # ------------------------
      - name: Package frontend
        run: |
          tar -czf frontend.tar.gz index.html add-user.html excommunicado.html location.html *.css *.js assets

      # ------------------------
      # Configure SSH
      # ------------------------
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          cat <<EOF > ~/.ssh/config
          Host *
            User ${EC2_USER}
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no
            UserKnownHostsFile=/dev/null
          EOF

          chmod 600 ~/.ssh/config

      # ------------------------
      # Validate Config
      # ------------------------
      - name: Validate config
        run: |
          set -euo pipefail

          [[ "${SPRING_DATASOURCE_URL}" == jdbc:mysql://* ]] || { echo "Invalid DB URL"; exit 1; }
          [ -n "${PRIVATE_ALB_DNS}" ] || { echo "PRIVATE_ALB_DNS required"; exit 1; }

      # ------------------------
      # Deploy Frontend + Smoke Test
      # ------------------------
      - name: Deploy frontend
        shell: bash
        run: |
          set -euo pipefail

          SSH_OPTS="-o ProxyJump=${EC2_USER}@${BASTION_HOST}"

          sed "s|<PRIVATE_ALB_DNS>|${PRIVATE_ALB_DNS}|g" deploy/nginx/jw-frontend.conf > /tmp/jw-frontend.conf

          IFS=',' read -r -a HOSTS <<< "${FRONTEND_HOSTS}"

          for HOST in "${HOSTS[@]}"; do
            HOST="$(echo "$HOST" | xargs)"
            [ -n "$HOST" ] || continue

            echo "Deploying frontend to $HOST"

            scp $SSH_OPTS frontend.tar.gz "${EC2_USER}@${HOST}:/tmp/"
            scp $SSH_OPTS /tmp/jw-frontend.conf "${EC2_USER}@${HOST}:/tmp/"

            ssh $SSH_OPTS "${EC2_USER}@${HOST}" "
              set -e
              sudo mkdir -p /var/www/html /etc/nginx/conf.d
              sudo find /var/www/html -mindepth 1 -exec rm -rf {} +
              sudo tar -xzf /tmp/frontend.tar.gz -C /var/www/html
              sudo mv /tmp/jw-frontend.conf /etc/nginx/conf.d/jw-frontend.conf
              sudo nginx -t
              sudo systemctl is-active --quiet nginx && sudo systemctl reload nginx || sudo systemctl start nginx

              # Smoke test
              curl -fsS http://localhost/api/users > /dev/null
            "
          done

      # ------------------------
      # Deploy Backend
      # ------------------------
      - name: Deploy backend
        shell: bash
        run: |
          set -euo pipefail

          SSH_OPTS="-o ProxyJump=${EC2_USER}@${BASTION_HOST}"
          JAR_FILE="$(ls backend/target/*.jar | head -n 1)"

          cat > /tmp/jw-registry.env <<EOF
          SERVER_PORT=${SERVER_PORT}
          SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
          SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
          SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
          JPA_DDL_AUTO=${JPA_DDL_AUTO}
          APP_CORS_ALLOWED_ORIGINS=${APP_CORS_ALLOWED_ORIGINS}
          DB_MAX_POOL_SIZE=${DB_MAX_POOL_SIZE}
          DB_MIN_IDLE=${DB_MIN_IDLE}
          EOF

          IFS=',' read -r -a HOSTS <<< "${BACKEND_HOSTS}"

          for HOST in "${HOSTS[@]}"; do
            HOST="$(echo "$HOST" | xargs)"
            [ -n "$HOST" ] || continue

            echo "Deploying backend to $HOST"

            scp $SSH_OPTS \
              "$JAR_FILE" \
              /tmp/jw-registry.env \
              deploy/systemd/jw-registry.service \
              "${EC2_USER}@${HOST}:/tmp/"

            ssh $SSH_OPTS "${EC2_USER}@${HOST}" "
              set -e

              command -v java >/dev/null || sudo apt-get update && sudo apt-get install -y openjdk-21-jre-headless

              sudo mkdir -p /opt/jw-registry /etc/jw-registry

              sudo mv /tmp/app.jar /opt/jw-registry/app.jar
              sudo mv /tmp/jw-registry.env /etc/jw-registry/jw-registry.env
              sudo mv /tmp/jw-registry.service /etc/systemd/system/jw-registry.service

              sudo chown -R ubuntu:ubuntu /opt/jw-registry
              sudo chmod 600 /etc/jw-registry/jw-registry.env
              sudo chmod 644 /etc/systemd/system/jw-registry.service

              sudo systemctl daemon-reload
              sudo systemctl enable jw-registry
              sudo systemctl restart jw-registry

              # Wait for service
              for i in \$(seq 1 20); do
                systemctl is-active --quiet jw-registry && break
                sleep 3
              done

              systemctl is-active --quiet jw-registry

              # Health check
              for i in \$(seq 1 20); do
                curl -fsS http://localhost:8080/health && exit 0
                sleep 3
              done

              sudo journalctl -u jw-registry --no-pager -n 100
              exit 1
            "
          done