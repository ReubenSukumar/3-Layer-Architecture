name: Deploy 3-Tier App (Bastion Multi-Instance)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'main'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ------------------------
      # Checkout Code
      # ------------------------
      - name: Checkout selected branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      # ------------------------
      # Build Backend
      # ------------------------
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build JAR
        run: |
          cd backend
          mvn clean package -DskipTests

      # ------------------------
      # Archive Frontend
      # ------------------------
      - name: Archive frontend
        run: |
          tar -czf frontend.tar.gz index.html add-user.html excommunicado.html location.html *.css *.js assets/

      # ------------------------
      # Setup SSH
      # ------------------------
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.BASTION_HOST }} >> ~/.ssh/known_hosts || true

      # ------------------------
      # Deploy Frontend (ALL INSTANCES)
      # ------------------------
      - name: Deploy frontend to all instances
        run: |
          IFS=',' read -ra HOSTS <<< "${{ secrets.FRONTEND_HOSTS }}"

          # Copy files + key to bastion
          scp -o StrictHostKeyChecking=no frontend.tar.gz ${{ secrets.EC2_USER }}@${{ secrets.BASTION_HOST }}:/tmp/frontend.tar.gz
          scp -o StrictHostKeyChecking=no ~/.ssh/id_rsa ${{ secrets.EC2_USER }}@${{ secrets.BASTION_HOST }}:/tmp/id_rsa

          for HOST in "${HOSTS[@]}"; do
            echo "Deploying to Frontend: $HOST"

            ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.BASTION_HOST }} "
              chmod 600 /tmp/id_rsa

              scp -i /tmp/id_rsa -o StrictHostKeyChecking=no /tmp/frontend.tar.gz ${{ secrets.EC2_USER }}@$HOST:/tmp/frontend.tar.gz &&

              ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@$HOST '
                sudo rm -rf /var/www/html/*
                sudo mkdir -p /var/www/html
                sudo tar -xzf /tmp/frontend.tar.gz -C /var/www/html
                sudo systemctl restart nginx
              '
            "
          done

      # ------------------------
      # Deploy Backend (ALL INSTANCES)
      # ------------------------
      - name: Build Backend JAR
        run: |
            cd backend
            mvn clean package -DskipTests

      - name: Verify JAR exists
        run: |
            ls -lh backend/target/

      - name: Deploy backend to all instances
        run: |
            set -e

            # Get JAR file safely
            JAR_FILE=$(ls backend/target/*.jar | head -n 1)
            echo "Using JAR: $JAR_FILE"

            IFS=',' read -ra HOSTS <<< "${{ secrets.BACKEND_HOSTS }}"

            # Copy JAR + key to bastion
            scp -o StrictHostKeyChecking=no "$JAR_FILE" ${{ secrets.EC2_USER }}@${{ secrets.BASTION_HOST }}:/tmp/app.jar
            scp -o StrictHostKeyChecking=no ~/.ssh/id_rsa ${{ secrets.EC2_USER }}@${{ secrets.BASTION_HOST }}:/tmp/id_rsa

            for HOST in "${HOSTS[@]}"; do
              echo "=============================="
              echo "Deploying to Backend: $HOST"
              echo "=============================="

              ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.BASTION_HOST }} "
                set -e

                chmod 600 /tmp/id_rsa

                echo 'Copying JAR to backend...'
                scp -i /tmp/id_rsa -o StrictHostKeyChecking=no /tmp/app.jar ${{ secrets.EC2_USER }}@$HOST:/tmp/app.jar

                echo 'Deploying on backend instance...'
                ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@$HOST '
                  set -e

                  echo \"Checking JAR...\"
                  if [ ! -f /tmp/app.jar ]; then
                    echo \"JAR not found! Aborting...\"
                    exit 1
                  fi

                  echo \"Creating directory...\"
                  sudo mkdir -p /opt/jw-registry

                  echo \"Moving JAR...\"
                  sudo mv /tmp/app.jar /opt/jw-registry/app.jar

                  echo \"Setting permissions...\"
                  sudo chown -R ubuntu:ubuntu /opt/jw-registry
                  sudo chmod +x /opt/jw-registry/app.jar

                  echo \"Validating JAR...\"
                  file /opt/jw-registry/app.jar

                  echo \"Restarting service...\"
                  sudo systemctl daemon-reload
                  sudo systemctl restart jw-registry

                  echo \"Service status:\"
                  sudo systemctl status jw-registry --no-pager || true
                '
              "
            done