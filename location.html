<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Location</title>
  <link rel="stylesheet" href="location.css" />
</head>
<body>
  <div class="background-overlay"></div>

  <main class="location-page">
    <section class="left-panel">
      <p class="eyebrow">CLASSIFIED ACCESS</p>
      <h1 class="title">LOCATION</h1>
      <p class="subtitle">
        Select a registered user to lock the globe onto the stored latitude and longitude.
      </p>

      <div id="userGrid" class="user-grid"></div>

      <div class="info-panel">
        <div class="info-row">
          <span class="label">User</span>
          <span class="value" id="place">Awaiting selection</span>
        </div>
        <div class="info-row">
          <span class="label">Latitude</span>
          <span class="value" id="latitude">0.0000</span>
        </div>
        <div class="info-row">
          <span class="label">Longitude</span>
          <span class="value" id="longitude">0.0000</span>
        </div>
        <div class="info-row">
          <span class="label">Excommunicado</span>
          <span class="value" id="excommunicadoAt">Not available</span>
        </div>
      </div>

      <a class="back-link btn-return" href="index.html">Return to Continental</a>
    </section>

    <section class="right-panel">
      <div id="globeViz"></div>
    </section>
  </main>

  <script src="https://unpkg.com/three"></script>
  <script src="https://unpkg.com/globe.gl"></script>
  <script src="location.js"></script>
</body>
</html>
