name: Deploy 3-Tier App

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to deploy
        required: true
        default: main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SERVER_PORT: "8080"
      JPA_DDL_AUTO: "update"
      DB_MAX_POOL_SIZE: "10"
      DB_MIN_IDLE: "2"
      APP_CORS_ALLOWED_ORIGINS: ${{ secrets.APP_CORS_ALLOWED_ORIGINS }}
      SPRING_DATASOURCE_URL: ${{ secrets.SPRING_DATASOURCE_URL }}
      SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
      SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
      BASTION_HOST: ${{ secrets.BASTION_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      FRONTEND_HOSTS: ${{ secrets.FRONTEND_HOSTS }}
      BACKEND_HOSTS: ${{ secrets.BACKEND_HOSTS }}

    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build backend JAR
        run: |
          cd backend
          mvn clean package -DskipTests

      - name: Package frontend
        run: |
          tar -czf frontend.tar.gz index.html add-user.html excommunicado.html location.html *.css *.js assets

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          {
            echo "Host bastion"
            echo "  HostName ${BASTION_HOST}"
            echo "  User ${EC2_USER}"
            echo "  IdentityFile ~/.ssh/id_rsa"
            echo "  StrictHostKeyChecking no"
            echo "  UserKnownHostsFile=/dev/null"
            echo
            echo "Host *"
            echo "  User ${EC2_USER}"
            echo "  IdentityFile ~/.ssh/id_rsa"
            echo "  StrictHostKeyChecking no"
            echo "  UserKnownHostsFile=/dev/null"
          } > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Verify JAR exists
        run: |
          ls -lh backend/target/
          test -f backend/target/app.jar

      - name: Validate datasource
        run: |
          set -euo pipefail
          case "${SPRING_DATASOURCE_URL}" in
            jdbc:mysql://*) ;;
            *)
              echo "SPRING_DATASOURCE_URL must be a full JDBC URL"
              exit 1
              ;;
          esac

      - name: Deploy frontend
        shell: bash
        run: |
          set -euo pipefail
          IFS=',' read -r -a HOSTS <<< "${FRONTEND_HOSTS}"

          for HOST in "${HOSTS[@]}"; do
            HOST="$(echo "$HOST" | xargs)"
            [ -n "$HOST" ] || continue
            echo "Deploying frontend to $HOST"

            scp -o ProxyJump="${EC2_USER}@${BASTION_HOST}" \
              frontend.tar.gz \
              "${EC2_USER}@${HOST}:/tmp/frontend.tar.gz"

            ssh -o ProxyJump="${EC2_USER}@${BASTION_HOST}" \
              "${EC2_USER}@${HOST}" \
              "sudo mkdir -p /var/www/html && sudo find /var/www/html -mindepth 1 -maxdepth 1 -exec rm -rf {} + && sudo tar -xzf /tmp/frontend.tar.gz -C /var/www/html && sudo systemctl restart nginx"
          done

      - name: Deploy backend
        shell: bash
        run: |
          set -euo pipefail
          JAR_FILE="$(ls backend/target/*.jar | head -n 1)"
          IFS=',' read -r -a HOSTS <<< "${BACKEND_HOSTS}"

          for HOST in "${HOSTS[@]}"; do
            HOST="$(echo "$HOST" | xargs)"
            [ -n "$HOST" ] || continue
            echo "Deploying backend to $HOST"

            cat > /tmp/jw-registry.env <<EOF
SERVER_PORT=${SERVER_PORT}
SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
JPA_DDL_AUTO=${JPA_DDL_AUTO}
APP_CORS_ALLOWED_ORIGINS=${APP_CORS_ALLOWED_ORIGINS}
DB_MAX_POOL_SIZE=${DB_MAX_POOL_SIZE}
DB_MIN_IDLE=${DB_MIN_IDLE}
EOF

            scp -o ProxyJump="${EC2_USER}@${BASTION_HOST}" \
              "$JAR_FILE" \
              "${EC2_USER}@${HOST}:/tmp/app.jar"

            scp -o ProxyJump="${EC2_USER}@${BASTION_HOST}" \
              /tmp/jw-registry.env \
              "${EC2_USER}@${HOST}:/tmp/jw-registry.env"

            ssh -o ProxyJump="${EC2_USER}@${BASTION_HOST}" \
              "${EC2_USER}@${HOST}" \
              "set -e; sudo apt-get update; sudo apt-get install -y openjdk-21-jre-headless; sudo mkdir -p /opt/jw-registry /etc/jw-registry; sudo mv /tmp/app.jar /opt/jw-registry/app.jar; sudo mv /tmp/jw-registry.env /etc/jw-registry/jw-registry.env; sudo chown -R ubuntu:ubuntu /opt/jw-registry; sudo chown root:root /etc/jw-registry/jw-registry.env; sudo chmod 600 /etc/jw-registry/jw-registry.env; sudo systemctl daemon-reload; sudo systemctl enable jw-registry; sudo systemctl restart jw-registry; for i in \$(seq 1 20); do if systemctl is-active --quiet jw-registry; then break; fi; sleep 3; done; sudo systemctl is-active --quiet jw-registry; for i in \$(seq 1 20); do if curl -fsS http://localhost:8080/health; then exit 0; fi; sleep 3; done; sudo journalctl -u jw-registry --no-pager -n 100; exit 1"
          done






          