name: Deploy 3-Tier App (Bastion Multi-Instance)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'main'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ------------------------
      # Checkout Code
      # ------------------------
      - name: Checkout selected branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      # ------------------------
      # Build Backend
      # ------------------------
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build JAR
        run: |
          cd backend
          mvn clean package -DskipTests

      # ------------------------
      # Archive Frontend
      # ------------------------
      - name: Archive frontend
        run: |
          tar -czf frontend.tar.gz index.html add-user.html excommunicado.html location.html *.css *.js assets/

      # ------------------------
      # Setup SSH (FIXED)
      # ------------------------
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh

          # Proper private key formatting
          printf "%s\n" "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # Start SSH agent and add key
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/id_rsa

          # Avoid failure if host not reachable
          ssh-keyscan -H ${{ secrets.BASTION_HOST }} >> ~/.ssh/known_hosts || true

      # ------------------------
      # Deploy Frontend (ALL INSTANCES)
      # ------------------------
      - name: Deploy frontend to all instances
        run: |
          IFS=',' read -ra HOSTS <<< "${{ secrets.FRONTEND_HOSTS }}"

          # Copy to bastion first
          scp -o StrictHostKeyChecking=no frontend.tar.gz ${{ secrets.EC2_USER }}@${{ secrets.BASTION_HOST }}:/tmp/frontend.tar.gz

          for HOST in "${HOSTS[@]}"; do
            echo "Deploying to Frontend: $HOST"

            ssh -A -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.BASTION_HOST }} "
              scp -o StrictHostKeyChecking=no /tmp/frontend.tar.gz ${{ secrets.EC2_USER }}@$HOST:/tmp/frontend.tar.gz &&
              ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@$HOST '
                sudo rm -rf /var/www/html/*
                sudo mkdir -p /var/www/html
                sudo tar -xzf /tmp/frontend.tar.gz -C /var/www/html
                sudo systemctl restart nginx
              '
            "
          done

      # ------------------------
      # Deploy Backend (ALL INSTANCES)
      # ------------------------
      - name: Deploy backend to all instances
        run: |
          IFS=',' read -ra HOSTS <<< "${{ secrets.BACKEND_HOSTS }}"

          # Copy JAR to bastion
          scp -o StrictHostKeyChecking=no backend/target/*.jar ${{ secrets.EC2_USER }}@${{ secrets.BASTION_HOST }}:/tmp/app.jar

          for HOST in "${HOSTS[@]}"; do
            echo "Deploying to Backend: $HOST"

            ssh -A -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.BASTION_HOST }} "
              scp -o StrictHostKeyChecking=no /tmp/app.jar ${{ secrets.EC2_USER }}@$HOST:/tmp/app.jar &&
              ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@$HOST '
                sudo mkdir -p /opt/jw-registry
                sudo mv /tmp/app.jar /opt/jw-registry/app.jar
                sudo chown -R ec2-user:ec2-user /opt/jw-registry

                sudo systemctl daemon-reload
                sudo systemctl restart jw-registry
                sudo systemctl status jw-registry --no-pager
              '
            "
          done