name: Deploy 3-Tier App (Bastion Multi-Instance)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to deploy
        required: true
        default: main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build JAR
        run: |
          cd backend
          mvn clean package -DskipTests

      - name: Archive frontend
        run: |
          tar -czf frontend.tar.gz \
            index.html add-user.html excommunicado.html location.html \
            *.css *.js assets

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          cat > ~/.ssh/config <<EOF
          Host bastion
            HostName ${{ secrets.BASTION_HOST }}
            User ${{ secrets.EC2_USER }}
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no
            UserKnownHostsFile=/dev/null

          Host *
            User ${{ secrets.EC2_USER }}
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no
            UserKnownHostsFile=/dev/null
          EOF
          chmod 600 ~/.ssh/config

      - name: Verify JAR exists
        run: |
          ls -lh backend/target/
          test -f backend/target/app.jar

      - name: Deploy frontend to all instances
        run: |
          set -euo pipefail

          IFS=',' read -r -a FRONTEND_HOSTS <<< "${{ secrets.FRONTEND_HOSTS }}"

          for HOST in "${FRONTEND_HOSTS[@]}"; do
            HOST="$(echo "$HOST" | xargs)"
            echo "Deploying frontend to $HOST"

            scp -o ProxyJump=${{ secrets.EC2_USER }}@${{ secrets.BASTION_HOST }} \
              frontend.tar.gz \
              ${{ secrets.EC2_USER }}@"$HOST":/tmp/frontend.tar.gz

            ssh -o ProxyJump=${{ secrets.EC2_USER }}@${{ secrets.BASTION_HOST }} \
              ${{ secrets.EC2_USER }}@"$HOST" \
              "sudo mkdir -p /var/www/html && \
               sudo find /var/www/html -mindepth 1 -maxdepth 1 -exec rm -rf {} + && \
               sudo tar -xzf /tmp/frontend.tar.gz -C /var/www/html && \
               sudo systemctl restart nginx"
          done


      - name: Deploy backend to all instances
        run: |
          set -euo pipefail
          IFS=',' read -r -a HOSTS <<< "${{ secrets.BACKEND_HOSTS }}"

          for HOST in "${HOSTS[@]}"; do
            HOST="$(echo "$HOST" | xargs)"
            echo "Deploying backend to $HOST"

            scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
              -J ${{ secrets.EC2_USER }}@${{ secrets.BASTION_HOST }} \
              backend/target/app.jar \
              ${{ secrets.EC2_USER }}@"$HOST":/tmp/app.jar

            ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
              -J ${{ secrets.EC2_USER }}@${{ secrets.BASTION_HOST }} \
              ${{ secrets.EC2_USER }}@"$HOST" <<'EOF'
                set -e

                sudo apt-get update
                sudo apt-get install -y openjdk-21-jre-headless

                sudo mkdir -p /opt/jw-registry
                sudo mkdir -p /etc/jw-registry

                sudo mv /tmp/app.jar /opt/jw-registry/app.jar
                sudo chown -R ubuntu:ubuntu /opt/jw-registry

                cat <<ENVEOF | sudo tee /etc/jw-registry/jw-registry.env >/dev/null
          SERVER_PORT=8080
          SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
          SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
          SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
          JPA_DDL_AUTO=update
          APP_CORS_ALLOWED_ORIGINS=${APP_CORS_ALLOWED_ORIGINS}
          DB_MAX_POOL_SIZE=10
          DB_MIN_IDLE=2
          ENVEOF

        env:
            SERVER_PORT: "8080"
            JPA_DDL_AUTO: "update"
            DB_MAX_POOL_SIZE: "10"
            DB_MIN_IDLE: "2"
            APP_CORS_ALLOWED_ORIGINS: ${{ secrets.APP_CORS_ALLOWED_ORIGINS }}
            SPRING_DATASOURCE_URL: ${{ secrets.SPRING_DATASOURCE_URL }}
            SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
            SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}

                cat <<SERVICEEOF | sudo tee /etc/systemd/system/jw-registry.service >/dev/null
             [Unit]
             Description=JW Registry Spring Boot API
             After=network.target

             [Service]
             Type=simple
             User=ubuntu
             Group=ubuntu
             WorkingDirectory=/opt/jw-registry
             EnvironmentFile=/etc/jw-registry/jw-registry.env
             ExecStart=/usr/bin/java -jar /opt/jw-registry/app.jar
             SuccessExitStatus=143
             Restart=always
             RestartSec=5

             [Install]
             WantedBy=multi-user.target
             SERVICEEOF

                sudo chmod 600 /etc/jw-registry/jw-registry.env
                sudo systemctl daemon-reload
                sudo systemctl enable jw-registry
                sudo systemctl restart jw-registry

                for i in $(seq 1 20); do
                  if curl -fsS http://localhost:8080/health; then
                    exit 0
                  fi
                  sleep 3
                done

                sudo journalctl -u jw-registry --no-pager -n 100
                exit 1
             EOF
             done
          
